<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app">
    <header>
      <h1>💸 Expense Tracker Pro</h1>
      <button id="themeToggle">🌙</button>
    </header>

    <div class="summary">
      <div class="card">
        <h3>Total Expenses</h3>
        <p id="totalExpense">₹0</p>
      </div>
      <div class="card">
        <h3>Total Entries</h3>
        <p id="totalEntries">0</p>
      </div>
    </div>

    <div class="form-section">
      <input type="text" id="desc" placeholder="Description">
      <input type="number" id="amount" placeholder="Amount">
      <input type="date" id="date">

      <select id="category">
        <option>Food</option>
        <option>Travel</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Entertainment</option>
        <option>Other</option>
      </select>

      <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="filters">
      <input type="text" id="search" placeholder="Search..." oninput="showExpenses()">

      <select id="filterCategory" onchange="showExpenses()">
        <option value="All">All Categories</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <button class="export-btn" onclick="exportCSV()">📁 Export CSV</button>

    <ul id="list"></ul>

    <canvas id="chart"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
