<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="app">
    <header>
      <h1>💸 Expense Tracker Pro</h1>
      <button id="themeToggle">🌙</button>
    </header>

    <div class="summary">
  <div class="card">
    <h3>Total Expenses</h3>
    <p id="totalExpense">₹0</p>
  </div>
  <div class="card">
    <h3>Total Entries</h3>
    <p id="totalEntries">0</p>
  </div>
</div>

<!-- Budget Section -->
<div class="budget-section">

  <h3>💰 Monthly Budget Tracker</h3>

  <input type="number" id="budgetInput" placeholder="Set Monthly Budget">
  <button onclick="saveBudget()">Set Budget</button>

  <div class="budget-info">
    <div class="budget-card">
      <h4>Budget</h4>
      <p>₹<span id="budgetAmount">0</span></p>
    </div>

    <div class="budget-card">
      <h4>Remaining</h4>
      <p>₹<span id="remainingAmount">0</span></p>
    </div>
  </div>

  <div class="progress-bar">
    <div id="budgetProgress"></div>
  </div>

  <p id="budgetPercent">0% Used</p>

</div>

<div class="form-section">
      <input type="text" id="desc" placeholder="Description">
      <input type="number" id="amount" placeholder="Amount">
      <input type="date" id="date">

      <select id="category">
        <option>Food</option>
        <option>Travel</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Entertainment</option>
        <option>Other</option>
      </select>

      <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="filters">
      <input type="text" id="search" placeholder="Search..." oninput="showExpenses()">

      <select id="filterCategory" onchange="showExpenses()">
        <option value="All">All Categories</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
      </select>
    </div>

   <button class="export-btn" onclick="exportCSV()">📁 Export CSV</button>

<ul id="list"></ul>

<div class="chart-section">
  <h3>Expense Analytics</h3>
  <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
